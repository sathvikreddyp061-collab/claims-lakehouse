claims_lakehouse:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '../data/duckdb/claims.duckdb') }}"
      threads: 4
      # Iceberg / s3 access via the duckdb httpfs+iceberg extensions.
      extensions:
        - httpfs
        - iceberg
      settings:
        s3_region: "us-east-1"
        s3_endpoint: "localhost:9000"
        s3_use_ssl: "false"
        s3_url_style: "path"
        s3_access_key_id: "minioadmin"
        s3_secret_access_key: "minioadmin"
