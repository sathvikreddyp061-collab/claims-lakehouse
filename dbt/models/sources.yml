version: 2

sources:
  - name: bronze
    description: "Iceberg lake tables, populated by streaming/bronze.py"
    schema: bronze
    tables:
      - name: claims_edi837
        description: "One row per Kafka-published EDI 837 envelope. service_month is the hidden partition key."
        columns:
          - name: claim_id
            tests: [not_null]
          - name: subscriber_id
            tests: [not_null]
          - name: service_date
            tests: [not_null]
          - name: total_charge
            tests: [not_null]
          - name: edi_837
            description: "Raw EDI 837 envelope (~-terminated segments)"
        loaded_at_field: ingest_ts
        freshness:
          warn_after: { count: 1, period: hour }
          error_after: { count: 6, period: hour }
