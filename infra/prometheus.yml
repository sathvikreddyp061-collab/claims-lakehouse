global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]

  - job_name: producer
    static_configs:
      - targets: ["host.docker.internal:9301"]

  - job_name: airflow
    metrics_path: /admin/metrics/
    static_configs:
      - targets: ["airflow:8080"]
